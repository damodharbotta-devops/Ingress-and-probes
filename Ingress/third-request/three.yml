apiVersion: apps/v1
kind: Deployment
metadata:
  name: three
spec:
  replicas: 2
  selector:
    matchLabels:
      app: uber
  template:
    metadata:
      labels:
        app: uber
    spec:
      containers:
      - name: cont-2
        image: shaikmustafa/cycle
        ports:
        - containerPort: 80
        env:
        - name: TITLE
          value: "APACHE APP2"
---
apiVersion: v1
kind: Service
metadata:
  name: damodhar
spec:
  type: NodePort
  ports:
  - port: 80
  selector:
    app: uber
